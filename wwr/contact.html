<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Contact Us-White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description"
      content="Contact us to plan your adventure. Reach us by phone,email, or visit our office for professional assistance">
    <meta name="author" content="Enwereuzor Amarachi Joy">
</head>

<body>

    <header>

        <div class="logo">
            <img src="images/wwr-logo.jpg" alt="wwr logo" width="200">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="contact-info">
        <h1>White Water Rafting Company</h1>
        <p><strong>Address:</strong>321 Main River Street, Port Harcourt, Nigeria</p>
        <p><strong>Phone:</strong>+234 800 321 7654</p>
        <p><strong>Email:</strong>info@whitewater.com</p>
    </div>

    <iframe
      src=https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1987.7607220992495!2d7.06577462304514!3d4.85189527421898!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1781203517777!5m2!1sen!2sng"
      width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"></iframe>


    <div class="box">

        <main class="contact-form">
            <div class="form-group">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-group">
                <label for="useremail">Email:</label>
                <input type="text" id="useremail" name="useremail" required>
            </div>


            <label for="fas fa-question-circle">Message Purpose:</label>
            <div class="radio-option">
                <input type="radio" id="generalinquiry" name="inquiryType" required>
                <label for="generalinquiry">General Inquiry</label>
            </div>

            <div class="radio-option">
                <input type="radio" id="resevervationQuestion" name="InquiryType" required>
                <label for="reservationQuestion">Reservation Inquiry</label>
            </div>

            <div class="radio-option">
                <input type="radio" id="websiteSuggestion" name="InquiryType" required>
                <label for="websiteSuggestion">Website Suggestion</label>
            </div>

            <div class="radio-option">
                <label for="fas fa-pen-fancy"></i>Message</label>
                <textarea id="userMessage" name="userMessage" row="4" placeholder="Type here"
                  required></textarea>
            </div>

            <div class="checkbox-wrapper">
                <label for="newsletterSignup">Please Subscribe me to
                    the monthly newsletter</label>
                <select id="newsletterSignup" name="newsletterSignup">
                    <input type="checkbox" id="newsletterSignup" name="newsletterSignup">
            </div>

            <button type="Submit">Submit</button>
    </div>


    </div class="box">


    <section class="employee-section">
        <h2>We Are Here To Serve You </h2>
        <div class="employee-flex">
            <figure>
                <img src="images/emp1.jpg" alt="Employee profile">
                <figcaption>River Adventure Guide</figcaption>
            </figure>
            <figure>
                <img src="images/emp2.jpg" alt="Employee Profile">
                <figcaption>Safety Personnel</figcaption>
            </figure>
            <figure>
                <img src="images/emp3.jpg" alt="Employee Profile">
                <figcaption>Whitewater Expedition Leader</figcaption>
            </figure>
        </div>
    </section>


    <!-- Footer -->
    <footer class="main-footer">

        <p>©2026🚀 White Water Rafting Company🚀| Enwereuzor Amarachi Joy</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-icon.jpg" alt="facebook icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-icon.jpg" alt="instagram icon">
            </a>
            <a href="https://x.com">
                <img src="images/twitter-icon.png" alt="twitter icon">
            </a>
        </nav>
    </footer>

</body>

</html>
